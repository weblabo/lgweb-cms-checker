<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自治体 CMS Checker</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/cms_checker.js"></script>
  </head>

  <body>
    <h2 id="main-title">
      <img src="icons/icon16_active.png" alt="" width="16" height="16" aria-hidden="true" />
      <span>自治体 CMS Checker</span>
    </h2>

    <div class="input-group">
      <label for="url" id="url-label">現在のURL</label>
      <input type="text" id="url" readonly placeholder="読み込み中..." aria-labelledby="url-label" aria-readonly="true" />
    </div>

    <div id="result" role="status" aria-live="polite">
      <span style="background: transparent; color: #64748b;">分析中...</span>
    </div>

    <div class="advice" aria-label="注意事項">※表示されるCMS、リニューアル日は参考値です。</div>
    <div class="advice" aria-label="注意事項">※エントランスページ（スプラッシュページ）では正しく判定されない場合があるため、総合トップページ等でのチェックを推奨します。</div>
  </body>
</html>
