<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自治体 CMS Checker</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/cms_checker.js"></script>
  </head>

  <body>
    <h2>
      <img src="icons/icon16_active.png" alt="" />
      自治体 CMS Checker
    </h2>

    <div class="input-group">
      <label for="url">現在のURL</label>
      <input type="text" id="url" readonly placeholder="読み込み中..." />
    </div>

    <div id="result">
      <span style="background: transparent; color: #64748b;">分析中...</span>
    </div>
    
    <div class="advice">※表示されるCMS、リニューアル日は参考値です。</div>
    <div class="advice">※エントランスページ（スプラッシュページ）では正しく判定されない場合があるため、総合トップページ等でのチェックを推奨します。</div>
  </body>
</html>
