<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自治体 CMS Checker</title>
    <link rel="stylesheet" href="style.css">
    <script src="./cms_checker.js"></script>
  </head>

  <body>
    <h2>
      <svg class="icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      自治体 CMS Checker
    </h2>

    <div class="input-group">
      <label for="url">現在のURL</label>
      <input type="text" id="url" readonly placeholder="読み込み中..." />
    </div>

    <div id="result">
      <span style="background: transparent; color: #64748b;">分析中...</span>
    </div>
    
    <div id="attention">※表示されるCMS、リニューアル日は参考値です。</div>
  </body>
</html>
